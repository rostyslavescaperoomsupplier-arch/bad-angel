name: Telegram bot
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
  actions: write
concurrency:
  group: telegram-bot
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: bot
        run: python3 scripts/telegram_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      - name: Commit changes
        run: |
          git config user.name "badangel-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Bot: aktualizacja treści z Telegrama"
          git push
      - name: Trigger deploy
        if: steps.bot.outputs.content_changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
